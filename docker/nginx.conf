# Nginx configuration — serves the SPA and proxies API requests to the Express backend
server {
  listen 8080;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API requests to the Express backend (internal port 3001)
  location /api/ {
    proxy_pass http://api-cheatsheets:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA fallback — serve index.html for all non-file routes (client-side routing)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-lived cache for hashed assets
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
